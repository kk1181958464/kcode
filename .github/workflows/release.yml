name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Set version from tag
        run: npm version "${{ github.ref_name }}" --no-git-tag-version --allow-same-version
      - run: npm run typecheck
      - run: npm test
      - run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      - name: Verify auto-update artifacts
        shell: pwsh
        run: |
          $setup = Get-ChildItem release -Filter 'KCode-*-setup.exe' | Select-Object -First 1
          $blockmap = Get-ChildItem release -Filter 'KCode-*-setup.exe.blockmap' | Select-Object -First 1
          if (-not $setup -or -not $blockmap -or -not (Test-Path release/latest.yml)) {
            throw 'Missing installer, blockmap, or latest.yml'
          }
          $metadata = Get-Content release/latest.yml -Raw
          if ($metadata -notmatch [regex]::Escape($setup.Name) -or $metadata -notmatch 'sha512:') {
            throw 'latest.yml does not reference the installer or hash'
          }
      - uses: actions/upload-artifact@v7
        with:
          name: KCode-${{ github.ref_name }}-windows
          path: |
            release/KCode-*-setup.exe
            release/KCode-*-setup.exe.blockmap
            release/latest.yml
  macos:
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Set version from tag
        run: npm version "${{ github.ref_name }}" --no-git-tag-version --allow-same-version
      - run: npm run typecheck
      - run: npm test
      - run: npm run dist:mac
      - name: Verify macOS auto-update artifacts
        run: |
          test -f release/latest-mac.yml
          grep -q 'sha512:' release/latest-mac.yml
      - uses: actions/upload-artifact@v7
        with:
          name: KCode-${{ github.ref_name }}-macos
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Set version from tag
        run: npm version "${{ github.ref_name }}" --no-git-tag-version --allow-same-version
      - run: npm run typecheck
      - run: npm test
      - run: npm run dist:linux
      - name: Verify Linux auto-update artifacts
        run: |
          test -f release/latest-linux.yml
          grep -q 'sha512:' release/latest-linux.yml
      - uses: actions/upload-artifact@v7
        with:
          name: KCode-${{ github.ref_name }}-linux
          path: |
            release/*.AppImage
            release/*.deb
            release/latest-linux.yml

  publish:
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: KCode-${{ github.ref_name }}-*
          merge-multiple: true
          path: release
      - uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
